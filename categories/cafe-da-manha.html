<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Receitas da Isa — explorando as melhores receitas de Café da Manhã.">
  <title>Café da Manhã — Receitas da Isa</title>
  <link rel="stylesheet" href="../css/main.css?v=1.2">
</head>
<body data-category="Café da Manhã">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar" aria-label="Navegação principal">
    <a class="nav-logo" href="../index.html" aria-label="Receitas da Isa - Início">
      <span class="nav-logo-icon">🍴</span>
      <span class="nav-logo-text">
        Receitas da Isa
        <em class="nav-logo-sub">sabores do mundo</em>
      </span>
    </a>
    <ul class="nav-links" role="list">
      <li><a class="nav-link" href="../index.html" id="nav-home"><span class="nav-link-icon">🏠</span> <span>Início</span></a></li>
      <li><a class="nav-link" href="../favorites.html" id="nav-favs"><span class="nav-link-icon">♥</span> <span>Favoritas</span></a></li>
      <li id="nav-auth-container">
        <button class="nav-login-btn" id="login-btn">
          <span>🔑</span> <span>Entrar</span>
        </button>
      </li>
    </ul>
  </nav>

  <!-- ===== CATEGORY HEADER ===== -->
  <header class="cat-page-header">
    <h1 class="cat-page-title">Café da <em>Manhã</em></h1>
    <p class="cat-page-count" id="category-count">(Carregando receitas...)</p>
  </header>

  <!-- ===== CONTROLS ===== -->
  <div class="cat-page-controls">
    <label for="sort-select">Organizar por</label>
    <select class="cat-page-select" id="sort-select">
      <option value="padrao">Padrão</option>
      <option value="recentes">Mais recentes</option>
      <option value="tempo">Menor tempo</option>
      <option value="calorias">Menos calorias</option>
    </select>
  </div>

  <!-- ===== GRID ===== -->
  <section class="section" style="padding-top: 0;">
    <div class="recipe-grid" id="recipe-grid"></div>

    <button class="btn-load-more" id="load-more-btn" style="display: none;">Carregar mais</button>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <span class="footer-logo">🍴 Receitas da Isa</span>
    <span class="footer-copy">Feito com <span>♥</span> e muito sabor • 2026</span>
  </footer>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="../js/auth.js?v=1"></script>
  <script type="module" src="../js/recipes.js?v=5"></script>
  <script type="module" src="../js/taxonomy-manager.js?v=3"></script>

</html>
