<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" id="meta-desc" content="Receita detalhada — Receitas da Isa">
  <title id="page-title">Receita — Receitas da Isa</title>
  <link rel="stylesheet" href="css/main.css?v=2">
  <style>
    /* Recipe detail extra styles */
    .recipe-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .recipe-detail-tag {
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(232,168,56,0.12);
      border: 1px solid rgba(232,168,56,0.25);
      color: var(--clr-gold-light);
    }
    .recipe-detail-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .recipe-section-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .tips-panel {
      margin-top: 2rem;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      padding: 0;
      flex-shrink: 0;
    }
    .share-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    /* Share Modal Styles */
    .share-modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .share-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .share-modal {
      background: var(--clr-surface);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      width: 90%;
      max-width: 320px;
      border: 1px solid var(--clr-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.2s ease;
    }
    .share-modal-overlay.active .share-modal {
      transform: translateY(0);
    }
    .share-modal-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      text-align: center;
      color: var(--clr-text);
    }
    .share-option {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem;
      margin-bottom: 0.8rem;
      background: var(--clr-surface-2);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-sm);
      color: var(--clr-text);
      font-family: var(--font-body);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .share-option:hover {
      background: rgba(232,168,56,0.1);
      border-color: var(--clr-gold);
    }
    .share-option:last-child {
      margin-bottom: 0;
    }
    .share-option-icon {
      font-size: 1.5rem;
    }
    /* Print styles */
    @media print {
      /* Hide unnecessary elements */
      nav, footer, .back-btn, .recipe-detail-actions, .loading-spinner, .share-modal-overlay {
        display: none !important;
      }
      
      @page {
        margin: 1.5cm;
      }
      
      /* Compact Grid layout */
      .recipe-body {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        grid-template-areas: 
          "ing nut"
          "steps steps" !important;
        gap: 1.5rem 2rem !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      
      .recipe-col-ingredients { grid-area: ing !important; margin: 0 !important; }
      .recipe-col-steps { grid-area: steps !important; margin-top: 1rem !important; }
      .recipe-col-nutrition { grid-area: nut !important; margin: 0 !important; }

      /* Hero section adjustments */
      .recipe-hero {
        height: auto !important;
        min-height: auto !important;
        padding: 0 !important;
        margin-bottom: 1.5rem !important;
      }
      .recipe-hero-img, .recipe-hero-overlay {
        display: none !important;
      }
      .recipe-hero-content {
        position: static !important;
        padding: 0 !important;
      }

      /* Compact Colors and legibility */
      body, .recipe-page {
        background: #fff !important;
        color: #000 !important;
        font-size: 10pt !important;
      }
      .recipe-detail-title {
        color: #000 !important;
        font-size: 20pt !important;
        margin-bottom: 0.2rem !important;
      }
      .recipe-detail-subtitle {
        color: #333 !important;
        margin-bottom: 0.8rem !important;
        font-size: 11pt !important;
      }
      .recipe-detail-meta {
        color: #333 !important;
        gap: 0.5rem 1rem !important;
      }
      .recipe-meta-pill {
        color: #000 !important;
        border: 1px solid #ccc !important;
        padding: 0.1rem 0.4rem !important;
        font-size: 9pt !important;
      }
      .recipe-detail-cuisine {
        color: #000 !important;
        margin-bottom: 0.4rem !important;
      }
      .recipe-detail-tags {
        margin-top: 0.5rem !important;
      }
      .recipe-detail-tag {
        padding: 0.1rem 0.4rem !important;
        font-size: 8pt !important;
        border-color: #ccc !important;
        color: #333 !important;
      }
      
      /* Panels and lists compacting */
      .recipe-panel {
        background: transparent !important;
        border: none !important;
        padding: 0 !important;
        box-shadow: none !important;
      }
      .recipe-panel-title {
        color: #000 !important;
        border-bottom: 1px solid #000 !important;
        padding-bottom: 0.2rem !important;
        margin-bottom: 0.5rem !important;
        font-size: 12pt !important;
      }
      
      /* Ingredients */
      .ingredient-item {
        border-bottom: 1px solid #eee !important;
        padding: 0.3rem 0 !important;
        font-size: 10pt !important;
      }
      .ingredient-name { color: #000 !important; }
      .ingredient-amount { color: #000 !important; }
      
      /* Steps */
      .recipe-section-title {
        font-size: 14pt !important;
        margin-bottom: 0.8rem !important;
        border-bottom: 1px solid #000 !important;
        padding-bottom: 0.2rem !important;
        color: #000 !important;
      }
      .steps-list {
        gap: 0.5rem !important;
      }
      .step-item {
        background: transparent !important;
        border: none !important;
        padding: 0 !important;
        gap: 0.8rem !important;
        margin-bottom: 0.5rem !important;
        break-inside: avoid;
      }
      .step-number {
        border: 1px solid #000 !important;
        background: transparent !important;
        color: #000 !important;
        width: 24px !important;
        height: 24px !important;
        min-width: 24px !important;
        font-size: 9pt !important;
      }
      .step-text {
        color: #000 !important;
        font-size: 10pt !important;
        padding-top: 0 !important;
        line-height: 1.4 !important;
      }
      
      /* Nutrition */
      .nutrition-grid {
        gap: 0.4rem !important;
      }
      .nutrition-item {
        border: 1px solid #ddd !important;
        background: transparent !important;
        padding: 0.4rem !important;
      }
      .nutrition-value {
        font-size: 11pt !important;
        color: #000 !important;
        background: transparent !important;
        -webkit-text-fill-color: #000 !important;
      }
      .nutrition-label {
        font-size: 7pt !important;
        color: #000 !important;
        margin-top: 0.1rem !important;
      }
      .nutrition-vd {
        font-size: 6pt !important;
        color: #555 !important;
      }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar" aria-label="Navegação principal">
    <a class="nav-logo" href="index.html" aria-label="Receitas da Isa - Início">
      <span class="nav-logo-icon">🍴</span>
      <span class="nav-logo-text">
        Receitas da Isa
        <em class="nav-logo-sub">sabores do mundo</em>
      </span>
    </a>
    <ul class="nav-links" role="list">
      <li><a class="nav-link" href="index.html" id="nav-home"><span class="nav-link-icon">🏠</span> <span>Início</span></a></li>
      <li><a class="nav-link" href="favorites.html" id="nav-favs"><span class="nav-link-icon">♥</span> <span>Favoritas</span></a></li>
      <li><a class="nav-link" href="planner.html" id="nav-planner"><span class="nav-link-icon">📅</span> <span>Planejador</span></a></li>
      <li id="nav-auth-container">
        <button class="nav-login-btn" id="login-btn">
          <span>🔑</span> <span>Entrar</span>
        </button>
      </li>
    </ul>
  </nav>

  <!-- Main content injected below by JS -->
  <main id="recipe-main">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
      <div class="loading-spinner" aria-label="Carregando receita..."></div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <span class="footer-logo">🍴 Receitas da Isa</span>
    <span class="footer-copy">Feito com <span>♥</span> e muito sabor • 2026</span>
  </footer>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script type="module" src="js/auth.js?v=2"></script>
  <script type="module" src="js/recipes.js?v=7"></script>
  <script type="module">
    // =============================================
    // RECIPE DETAIL PAGE CONTROLLER
    // =============================================

    function getRecipeIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    let globalRecipe = null;
    let currentServings = 1;

    function renderIngredientsList() {
      if (!globalRecipe) return '';
      
      return globalRecipe.ingredients.map(ing => {
        let scaledAmount = ing.amount;
        
        // Extract numbers at the beginning (ex: "200g", "2", "1.5 xícaras")
        const match = ing.amount.match(/^([\d.,]+)\s*(.*)$/);
        if (match) {
           let numText = match[1].replace(',', '.');
           let num = parseFloat(numText);
           if (!isNaN(num)) {
             let scaledNum = num * currentServings;
             // Round to max 1 decimal place to avoid long fractions
             scaledNum = Math.round(scaledNum * 10) / 10;
             let scaledStr = scaledNum.toString().replace('.', ',');
             scaledAmount = `${scaledStr} ${match[2]}`.trim();
           }
        }

        return `
        <li class="ingredient-item">
          <span class="ingredient-name">${ing.item}</span>
          <span class="ingredient-amount">${scaledAmount}</span>
        </li>`;
      }).join('');
    }

    function updateServings(delta) {
      if (!globalRecipe) return;
      const newServings = currentServings + delta;
      if (newServings < 1) return; // Minimum 1 serving
      
      currentServings = newServings;
      
      // Update DOM
      document.getElementById('serving-count-display').textContent = currentServings;
      document.getElementById('sig-ingredient-list').innerHTML = renderIngredientsList();
      
      // Dynamically update yield text if it exists
      const yieldText = document.getElementById('yield-display');
      if (yieldText) {
        const totalYield = currentServings * globalRecipe.servings;
        if (currentServings === 1) {
          yieldText.textContent = `1 receita rende ${totalYield} porções`;
        } else {
          yieldText.textContent = `${currentServings} receitas rendem ${totalYield} porções`;
        }
      }
    }

    function renderRecipePage(recipe) {
      globalRecipe = recipe;
      currentServings = 1; // Default to 1 recipe

      const fav = isFavorite(recipe.id);
      const meta = getCuisineMeta(recipe.cuisine);
      const diffClass = getDifficultyClass(recipe.difficulty);

      // Update meta
      document.title = `${recipe.title} — Receitas da Isa`;
      document.getElementById('meta-desc').setAttribute('content', recipe.subtitle);

      const tagsHtml = (recipe.tags || []).map(t =>
        `<span class="recipe-detail-tag">${t}</span>`
      ).join('');

      // Steps
      const stepsHtml = recipe.steps.map((step, i) => `
        <li class="step-item" onclick="this.classList.toggle('completed')" style="cursor:pointer;">
          <span class="step-number">${i + 1}</span>
          <p class="step-text">${step}</p>
        </li>`).join('');

      const n = recipe.nutrition || {
        calories: recipe.calories || 0,
        protein: "0g",
        carbs: "0g",
        fat: "0g"
      };
      
      const calcVD = (val, max) => {
        const num = parseFloat(String(val).replace(/[^0-9.]/g, '')) || 0;
        return Math.round((num / max) * 100);
      };

      let nutritionHtml = `
        <div class="nutrition-item">
          <div class="nutrition-value">${n.calories}</div>
          <div class="nutrition-label">Calorias</div>
          <div class="nutrition-vd">${calcVD(n.calories, 2000)}% VD</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-value">${n.protein}</div>
          <div class="nutrition-label">Proteína</div>
          <div class="nutrition-vd">${calcVD(n.protein, 50)}% VD</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-value">${n.carbs}</div>
          <div class="nutrition-label">Carboidratos</div>
          <div class="nutrition-vd">${calcVD(n.carbs, 275)}% VD</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-value">${n.fat}</div>
          <div class="nutrition-label">Gorduras</div>
          <div class="nutrition-vd">${calcVD(n.fat, 78)}% VD</div>
        </div>
      `;
      if (n.fiber) {
        nutritionHtml += `
        <div class="nutrition-item" style="grid-column: span 2;">
          <div class="nutrition-value">${n.fiber}</div>
          <div class="nutrition-label">Fibras</div>
          <div class="nutrition-vd">${calcVD(n.fiber, 28)}% VD</div>
        </div>`;
      }

      const refPage = document.referrer && document.referrer.includes('favorites') ? 'favorites.html' : 'index.html';
      const backLabel = document.referrer && document.referrer.includes('favorites') ? '← Voltar às favoritas' : '← Voltar às receitas';

      document.getElementById('recipe-main').innerHTML = `
        <article class="recipe-page" aria-label="${recipe.title}">

          <!-- HERO -->
          <div class="recipe-hero">
            <img class="recipe-hero-img" src="${recipe.image}" alt="${recipe.title}">
            <div class="recipe-hero-overlay" aria-hidden="true"></div>
            <div class="recipe-hero-content">
              <div class="recipe-detail-cuisine">
                <span>${meta.flag}</span> ${recipe.cuisine}
              </div>
              <h1 class="recipe-detail-title">${recipe.title}</h1>
              <p class="recipe-detail-subtitle">${recipe.subtitle}</p>

              <div class="recipe-detail-meta">
                ${recipe.prepTime ? `<span class="recipe-meta-pill">⏱ <strong>${recipe.prepTime} min</strong> preparo</span>` : ''}
                ${recipe.cookTime ? `<span class="recipe-meta-pill">🔥 <strong>${recipe.cookTime} min</strong> cozimento</span>` : ''}
                ${recipe.totalTime ? `<span class="recipe-meta-pill">⏳ <strong>${recipe.totalTime} min</strong> total</span>` : ''}
                <span class="recipe-meta-pill">👤 <strong>${recipe.servings}</strong> porções</span>
                <span class="recipe-meta-pill card-difficulty ${diffClass}" style="padding:0.3rem 0.8rem;">${recipe.difficulty}</span>
              </div>

              <div class="recipe-detail-tags">${tagsHtml}</div>

              <div class="recipe-detail-actions">
                <button class="btn btn-primary" id="detail-fav-btn"
                        onclick="handleDetailFav('${recipe.id}')"
                        aria-label="${fav ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}">
                  ${fav ? '♥ Nas suas favoritas' : '♡ Adicionar aos favoritos'}
                </button>
                <button class="btn btn-outline" id="detail-planner-btn"
                        onclick="handleAddPlanner('${recipe.id}')"
                        aria-label="Adicionar ao Planejador">
                  <span>📅</span> Adicionar ao Planejador
                </button>
                <button class="btn btn-outline share-btn" onclick="openShareModal()" id="share-btn" aria-label="Compartilhar receita">
                  <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- BODY GRID -->
          <div class="recipe-body">

            <!-- COLUMN 1: Ingredients -->
            <div class="recipe-col-ingredients">
              <button class="back-btn" onclick="window.location='${refPage}'" id="back-btn">
                ← Voltar
              </button>

              <div class="recipe-panel">
                <div class="recipe-panel-title" style="display:flex; justify-content:space-between; align-items:center;">
                  <div>🥄 Ingredientes</div>
                  <div class="serving-controls" style="display:flex; align-items:center; gap:0.8rem; background: var(--clr-surface-2); padding: 0.2rem 0.6rem; border-radius: var(--radius-sm); border: 1px solid var(--clr-border);">
                    <button onclick="updateServings(-1)" style="color:var(--clr-gold); font-size:1.2rem; cursor:pointer;" aria-label="Diminuir porções">−</button>
                    <span id="serving-count-display" style="font-weight:700; color:var(--clr-text); min-width: 14px; text-align:center; font-family: var(--font-body); font-size: 0.9rem;">${currentServings}</span>
                    <button onclick="updateServings(1)" style="color:var(--clr-gold); font-size:1.2rem; cursor:pointer;" aria-label="Aumentar porções">+</button>
                  </div>
                </div>
                <div id="yield-display" style="font-size: 0.8rem; color: var(--clr-text-dim); margin-top: 0.2rem; margin-bottom: 1rem; font-style: italic;">
                  1 receita rende ${recipe.servings} porções
                </div>
                <ul class="ingredient-list" id="sig-ingredient-list">${renderIngredientsList()}</ul>
              </div>
            </div>

            <!-- COLUMN 2: Steps -->
            <div class="recipe-col-steps">
              <h2 class="recipe-section-title">👨‍🍳 Modo de Preparo</h2>
              <ol class="steps-list">${stepsHtml}</ol>
            </div>

            <!-- COLUMN 3: Nutrition -->
            <div class="recipe-col-nutrition">
              <h2 class="recipe-section-title desktop-spacer" aria-hidden="true">&nbsp;</h2>
              <div class="recipe-panel">
                <div class="recipe-panel-title">📊 Informação Nutricional</div>
                <div class="nutrition-grid">${nutritionHtml}</div>
                <p style="font-size:0.7rem;color:var(--clr-text-dim);margin-top:0.8rem;text-align:center;">
                  * Nutrição por 1 porção
                </p>
              </div>
            </div>

          </div>

          <!-- SHARE MODAL -->
          <div class="share-modal-overlay" id="share-modal" onclick="closeShareModal(event)">
            <div class="share-modal" onclick="event.stopPropagation()">
              <h3 class="share-modal-title">O que compartilhar?</h3>
              <button class="share-option" onclick="shareLink()">
                <span class="share-option-icon">🔗</span>
                Enviar link da receita
              </button>
              <button class="share-option" onclick="sharePDF()">
                <span class="share-option-icon">📄</span>
                Salvar ou enviar PDF
              </button>
            </div>
          </div>
        </article>
      `;
    }

    async function handleDetailFav(id) {
      const nowFav = await window.handleFavToggle(id);
      const btn = document.getElementById('detail-fav-btn');
      if (btn) {
        btn.innerHTML = nowFav ? '♥ Nas suas favoritas' : '♡ Adicionar aos favoritos';
        btn.setAttribute('aria-label', nowFav ? 'Remover dos favoritos' : 'Adicionar aos favoritos');
      }
    }

    async function handleAddPlanner(id) {
      if (!globalRecipe) return;
      const success = await window.updatePlanner(id, currentServings);
      if (success) {
        const btn = document.getElementById('detail-planner-btn');
        if (btn) {
          btn.innerHTML = '<span>✅</span> Adicionado ao Planejador!';
        }
      }
    }


    async function init() {
      initNavbar();
      const id = getRecipeIdFromURL();
      if (!id) {
        document.getElementById('recipe-main').innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1rem;">
            <div style="font-size:4rem;">🍽️</div>
            <h1 style="font-family:var(--font-display);">Receita não encontrada</h1>
            <a href="index.html" class="btn btn-primary">← Voltar ao início</a>
          </div>`;
        return;
      }
      try {
        const recipe = await loadRecipe(id);
        renderRecipePage(recipe);
        
        if (window.getPlanner) {
          const planner = window.getPlanner();
          if (planner[id]) {
            const btn = document.getElementById('detail-planner-btn');
            if (btn) btn.innerHTML = '<span>✅</span> Adicionado ao Planejador!';
          }
        }
      } catch (e) {
        document.getElementById('recipe-main').innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1rem;text-align:center;padding:2rem;">
            <div style="font-size:4rem;">😕</div>
            <h1 style="font-family:var(--font-display);">Receita não encontrada</h1>
            <p style="color:var(--clr-text-muted);">${e.message}</p>
            <a href="index.html" class="btn btn-primary" id="back-home-link">← Voltar ao início</a>
          </div>`;
      }
    }

    function openShareModal() {
      const modal = document.getElementById('share-modal');
      if (modal) modal.classList.add('active');
    }
    
    function closeShareModal(e) {
      const modal = document.getElementById('share-modal');
      if (modal) modal.classList.remove('active');
    }

    async function shareLink() {
      closeShareModal();
      if (!globalRecipe) return;
      const shareData = {
        title: globalRecipe.title,
        text: `Confira esta receita de ${globalRecipe.title}!`,
        url: window.location.href
      };
      
      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          console.log('Erro ao compartilhar:', err);
        }
      } else {
        // Fallback
        navigator.clipboard.writeText(window.location.href);
        alert('Link copiado para a área de transferência!');
      }
    }

    function sharePDF() {
      closeShareModal();
      // Print dialog is the native way to "Save as PDF"
      window.print();
    }

    document.addEventListener('DOMContentLoaded', init);

    // Expor funções usadas em onclick dinâmicos
    window.updateServings = updateServings;
    window.handleDetailFav = handleDetailFav;
    window.handleAddPlanner = handleAddPlanner;
    window.openShareModal = openShareModal;
    window.closeShareModal = closeShareModal;
    window.shareLink = shareLink;
    window.sharePDF = sharePDF;
  </script>
</body>
</html>
