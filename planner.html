<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Planejador de Menu — Receitas da Isa. Planeje suas refeições e gere sua lista de compras automaticamente.">
  <title>Planejador de Menu — Receitas da Isa</title>
  <link rel="stylesheet" href="css/main.css?v=2">
  <style>
    .planner-banner {
      padding: 4rem 1.5rem;
      text-align: center;
      background: var(--clr-surface-2);
      border-bottom: 1px solid var(--clr-border);
    }
    .planner-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    
    /* Shopping List Modal */
    .shopping-modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      padding: 1rem;
    }
    .shopping-modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .shopping-modal {
      background: var(--clr-surface);
      border-radius: var(--radius-md);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--clr-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.2s ease;
    }
    .shopping-modal-overlay.active .shopping-modal {
      transform: translateY(0);
    }
    .shopping-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--clr-border);
      padding-bottom: 1rem;
    }
    .shopping-modal-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--clr-text);
      margin: 0;
    }
    .close-modal-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--clr-text-muted);
      cursor: pointer;
    }
    .shopping-list-content {
      overflow-y: auto;
      flex-grow: 1;
      margin-bottom: 1.5rem;
      font-family: var(--font-body);
    }
    .shopping-list-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px dashed var(--clr-border);
    }
    .shopping-list-item:last-child {
      border-bottom: none;
    }
    .shopping-modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      border-top: 1px solid var(--clr-border);
      padding-top: 1rem;
    }

    /* Print Styles for Shopping List */
    @media print {
      body * { visibility: hidden; }
      #shopping-print-area, #shopping-print-area * { visibility: visible; }
      #shopping-print-area {
        position: absolute;
        left: 0; top: 0; width: 100%;
      }
      .shopping-modal-overlay { background: none; position: static; }
      .shopping-modal { box-shadow: none; border: none; padding: 0; max-height: none; }
      .shopping-modal-actions, .close-modal-btn { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar" aria-label="Navegação principal">
    <a class="nav-logo" href="index.html" aria-label="Receitas da Isa - Início">
      <span class="nav-logo-icon">🍴</span>
      <span class="nav-logo-text">
        Receitas da Isa
        <em class="nav-logo-sub">sabores do mundo</em>
      </span>
    </a>
    <ul class="nav-links" role="list">
      <li><a class="nav-link" href="index.html" id="nav-home"><span class="nav-link-icon">🏠</span> <span>Início</span></a></li>
      <li><a class="nav-link" href="favorites.html" id="nav-favs"><span class="nav-link-icon">♥</span> <span>Favoritas</span></a></li>
      <li><a class="nav-link" href="planner.html" id="nav-planner"><span class="nav-link-icon">📅</span> <span>Planejador</span></a></li>
      <li id="nav-auth-container">
        <button class="nav-login-btn" id="login-btn">
          <span>🔑</span> <span>Entrar</span>
        </button>
      </li>
    </ul>
  </nav>

  <!-- ===== BANNER ===== -->
  <header class="planner-banner">
    <div style="color: var(--clr-gold); font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.8rem;">📅 Menu da Semana</div>
    <h1 style="font-family: var(--font-display); font-size: 3rem; margin-bottom: 1rem;">Meu <em>Planejador</em></h1>
    <p id="planner-banner-desc" style="color: var(--clr-text-muted); max-width: 600px; margin: 0 auto; line-height: 1.6;">Planeje suas refeições e gere sua lista de compras automaticamente.</p>
  </header>

  <!-- ===== CONTENT ===== -->
  <section class="section" id="planner-section">
    <div class="planner-actions" id="planner-actions" style="display: none;">
      <button class="btn btn-outline" onclick="window.handleClear()">🗑 Nova Semana (Limpar)</button>
      <button class="btn btn-primary" onclick="openShoppingList()">🛒 Gerar Lista de Compras</button>
    </div>

    <div class="recipe-grid" id="recipe-grid" role="list" aria-label="Receitas planejadas">
      <div class="loading-spinner" aria-label="Carregando planejador..."></div>
    </div>
  </section>

  <!-- ===== SHOPPING LIST MODAL ===== -->
  <div class="shopping-modal-overlay" id="shopping-modal" onclick="closeShoppingList(event)">
    <div class="shopping-modal" id="shopping-print-area" onclick="event.stopPropagation()">
      <div class="shopping-modal-header">
        <h3 class="shopping-modal-title">🛒 Lista de Compras</h3>
        <button class="close-modal-btn" onclick="closeShoppingList()">✕</button>
      </div>
      <div class="shopping-list-content" id="shopping-list-content">
        <!-- List will be injected here -->
      </div>
      <div class="shopping-modal-actions">
        <button class="btn btn-outline" onclick="copyShoppingList()">📋 Copiar Texto</button>
        <button class="btn btn-primary" onclick="printShoppingList()">📄 Salvar PDF</button>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <span class="footer-logo">🍴 Receitas da Isa</span>
    <span class="footer-copy">Feito com <span>♥</span> e muito sabor • 2026</span>
  </footer>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script type="module" src="js/auth.js?v=2"></script>
  <script type="module" src="js/recipes.js?v=7"></script>
  <script type="module">
    let allRecipes = [];
    let plannerRecipes = [];
    let currentPlanner = {};

    async function init() {
      initNavbar();
      try {
        const index = await loadIndex();
        allRecipes = index.recipes;
        
        loadPlannerData();
      } catch (e) {
        document.getElementById('recipe-grid').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">😕</div>
            <h3 class="empty-state-title">Erro ao carregar</h3>
            <p class="empty-state-text">${e.message}</p>
          </div>`;
      }
    }

    function loadPlannerData() {
      currentPlanner = getPlanner(); // { recipeId: servings_multiplier }
      
      const plannerIds = Object.keys(currentPlanner);
      plannerRecipes = allRecipes.filter(r => plannerIds.includes(r.id));
      
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('recipe-grid');
      const actions = document.getElementById('planner-actions');
      const desc = document.getElementById('planner-banner-desc');

      if (plannerRecipes.length === 0) {
        actions.style.display = 'none';
        desc.textContent = 'Você ainda não tem receitas no planejador. Explore as receitas e adicione as que deseja fazer!';
        grid.innerHTML = `
          <div class="empty-state">
            <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">🍽️</span>
            <h3 class="empty-state-title">Planejador Vazio</h3>
            <p class="empty-state-text">Explore as receitas e clique em "Adicionar ao Planejador".</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 1.5rem;">
              Explorar receitas
            </a>
          </div>`;
        return;
      }

      actions.style.display = 'flex';
      desc.textContent = `${plannerRecipes.length} receita(s) planejada(s) para esta semana.`;
      
      // We pass the planner servings multiplier to renderRecipeCard so it shows the badge
      grid.innerHTML = plannerRecipes.map((r, i) =>
        renderRecipeCard(r, { 
          featured: false, 
          plannerServings: currentPlanner[r.id]
        })
).join('');
    }

    async function handleClear() {
      if (confirm('Tem certeza que deseja limpar o planejador? Isso não afetará suas receitas favoritas.')) {
        await window.clearPlanner();
        loadPlannerData();
      }
    }

    // --- Ingrediente Logic ---

    // Tries to parse an amount string into a numeric value and a standardized unit
    function parseAmount(amountStr) {
      if (!amountStr) return { value: 0, unit: '', original: '' };
      
      const lower = amountStr.toLowerCase().trim();
      if (lower === 'a gosto' || lower === 'q.b.' || lower === 'q.b') {
        return { value: 0, unit: 'a gosto', original: amountStr };
      }

      // Check mixed fraction like "1 1/2"
      let match = amountStr.match(/^(\d+)\s+(\d+)\s*\/\s*(\d+)\s*(.*)$/);
      if (match) {
        const num = parseInt(match[1], 10) + (parseInt(match[2], 10) / parseInt(match[3], 10));
        return processParsed(num, match[4], amountStr);
      }

      // Check simple fraction like "1/2"
      match = amountStr.match(/^(\d+)\s*\/\s*(\d+)\s*(.*)$/);
      if (match) {
        const num = parseInt(match[1], 10) / parseInt(match[2], 10);
        return processParsed(num, match[3], amountStr);
      }

      // Normal decimal/integer
      match = amountStr.match(/^([\d.,]+)\s*(.*)$/);
      if (match) {
        let numText = match[1].replace(',', '.');
        let num = parseFloat(numText);
        if (!isNaN(num)) {
          return processParsed(num, match[2], amountStr);
        }
      }

      return { value: 0, unit: amountStr, original: amountStr };

      function processParsed(num, unitText, orig) {
        let unit = unitText.trim().toLowerCase();
        // Metric conversions normalization
        if (unit === 'kg' || unit === 'kgs' || unit === 'quilo' || unit === 'quilos') {
          num *= 1000;
          unit = 'g';
        } else if (unit === 'l' || unit === 'litro' || unit === 'litros') {
          num *= 1000;
          unit = 'ml';
        }
        return { value: num, unit: unit, original: orig };
      }
    }

    function parseAndStandardize(name, amountStr) {
      // 1. Normalizar nome do ingrediente
      let normalizedName = name.trim();
      
      // Remover detalhes de preparo e termos redundantes
      const removals = [
        /\s+picad[oa]s?/gi,
        /\s+ralad[oa]s?/gi,
        /\s+fatiad[oa]s?/gi,
        /\s+moíd[oa]s?/gi,
        /\s+amassad[oa]s?/gi,
        /\s+espremid[oa]s?/gi,
        /\s+em\s+cubos/gi,
        /\s+em\s+rodelas/gi,
        /\s+inteir[oa]s?/gi,
        /\s+ralado\s+\(molho\)/gi,
        /\s+em\s+pó/gi,
        /\s+frescas?/gi,
        /\s+seco/gi,
        /\s+secchi/gi,
        /\s+ou\s+guanciale/gi,
        /\s+branco\s+seco/gi
      ];

      removals.forEach(regex => {
        normalizedName = normalizedName.replace(regex, '');
      });

      normalizedName = normalizedName.trim();

      // Tratar caso específico do alho (nome deve ser 'Dentes de alho' e unidade 'unidades')
      if (normalizedName.toLowerCase().includes('alho') && !normalizedName.toLowerCase().includes('pó')) {
        normalizedName = 'Dentes de alho';
      }

      // Tratar caso específico de cebola (cebola picada -> cebola)
      if (normalizedName.toLowerCase() === 'cebola') {
        normalizedName = 'Cebola';
      }

      normalizedName = normalizedName.charAt(0).toUpperCase() + normalizedName.slice(1);

      // 2. Parse da quantidade e unidade original
      let parsed = parseAmount(amountStr);
      let value = parsed.value;
      let unit = parsed.unit.toLowerCase().trim();

      // Normalizar unidades de contagem para 'unidades'
      if (unit === 'unidade' || unit === 'unidades' || unit === 'u' || unit === 'dente' || unit === 'dentes' || unit === 'talo' || unit === 'talos' || unit === 'mãozada' || unit === 'mãozadas') {
        unit = 'unidades';
      }

      // Se for dentes de alho, forçar a unidade para 'unidades'
      if (normalizedName === 'Dentes de alho') {
        unit = 'unidades';
      }

      // Normalização de massa
      if (unit === 'g' || unit === 'gr' || unit === 'grama' || unit === 'gramas') {
        unit = 'g';
      } else if (unit === 'kg' || unit === 'kgs' || unit === 'quilo' || unit === 'quilos') {
        value *= 1000;
        unit = 'g';
      }

      // Normalização de volume / líquidos (ML)
      const liquidUnitsMap = {
        'ml': 1,
        'mls': 1,
        'l': 1000,
        'litro': 1000,
        'litros': 1000,
        'xícara': 240,
        'xícaras': 240,
        'xicara': 240,
        'xicaras': 240,
        'colher': 15,
        'colheres': 15,
        'colher de sopa': 15,
        'colheres de sopa': 15,
        'col de sopa': 15,
        'col. sopa': 15,
        'colher de chá': 5,
        'colheres de chá': 5,
        'col de chá': 5,
        'col. chá': 5,
        'col chá': 5
      };

      let isLiquid = false;
      for (const [keyUnit, multiplier] of Object.entries(liquidUnitsMap)) {
        if (unit === keyUnit) {
          value *= multiplier;
          unit = 'ml';
          isLiquid = true;
          break;
        }
      }

      // 3. Aplicar preferências de conversão 1g = 1ml com base no ingrediente
      const lowerName = normalizedName.toLowerCase();

      // Forçar Sal e Pimenta-do-reino para "a gosto"
      if (lowerName === 'sal' || lowerName === 'pimenta-do-reino') {
        value = 0;
        unit = 'a gosto';
      }
      
      const ingredientPreferences = {
        // Líquidos -> ML
        'azeite': 'ml',
        'óleo': 'ml',
        'vinho': 'ml',
        'leite': 'ml',
        'água': 'ml',
        'suco': 'ml',
        'caldo': 'ml',
        'shoyu': 'ml',
        'vinagre': 'ml',
        'mel': 'ml',
        'molho': 'ml',
        
        // Sólidos -> G
        'manteiga': 'g',
        'queijo': 'g',
        'parmesão': 'g',
        'pecorino': 'g',
        'presunto': 'g',
        'pancetta': 'g',
        'guanciale': 'g',
        'carne': 'g',
        'frango': 'g',
        'peixe': 'g',
        'arroz': 'g',
        'funghi': 'g',
        'chocolate': 'g',
        'farinha': 'g',
        'açúcar': 'g',
        'sal': 'g',
        'pimenta': 'g',
        'pimenta-do-reino': 'g',
        'castanha': 'g'
      };

      // Procurar match de preferência
      let preferredUnit = null;
      for (const [prefKey, prefUnit] of Object.entries(ingredientPreferences)) {
        if (lowerName.includes(prefKey)) {
          preferredUnit = prefUnit;
          break;
        }
      }

      if (preferredUnit) {
        if (unit === 'ml' && preferredUnit === 'g') {
          // Converter de ml para g (1:1)
          unit = 'g';
        } else if (unit === 'g' && preferredUnit === 'ml') {
          // Converter de g para ml (1:1)
          unit = 'ml';
        }
      }

      return {
        name: normalizedName,
        value: value,
        unit: unit
      };
    }

    function formatAmount(value, unit) {
      if (unit === 'a gosto') return 'a gosto';
      if (value === 0) return unit; // Unparsed original string
      
      // Metric formatting back
      if (unit === 'g' && value >= 1000) {
        return `${(value / 1000).toLocaleString('pt-BR')} kg`;
      }
      if (unit === 'ml' && value >= 1000) {
        return `${(value / 1000).toLocaleString('pt-BR')} L`;
      }
      
      // Convert common decimals to fractions
      let numStr = "";
      const intPart = Math.floor(value);
      const fracPart = value - intPart;
      const epsilon = 0.01;
      
      let fracStr = "";
      if (Math.abs(fracPart - 0.5) < epsilon) fracStr = "1/2";
      else if (Math.abs(fracPart - 0.25) < epsilon) fracStr = "1/4";
      else if (Math.abs(fracPart - 0.75) < epsilon) fracStr = "3/4";
      else if (Math.abs(fracPart - 1/3) < epsilon) fracStr = "1/3";
      else if (Math.abs(fracPart - 2/3) < epsilon) fracStr = "2/3";
      else {
        const rounded = Math.round(value * 100) / 100;
        numStr = rounded.toString().replace('.', ',');
      }

      if (fracStr) {
        if (intPart > 0) numStr = `${intPart} ${fracStr}`;
        else numStr = fracStr;
      }

      // Se for unidades, tratar singular/plural bonito
      if (unit === 'unidades') {
        return value === 1 ? `1 unidade` : `${numStr} unidades`;
      }

      return `${numStr} ${unit}`.trim();
    }

    async function compileShoppingList() {
      const itemsMap = new Map(); // key: "ingredient name|unit", value: total numeric value

      // Carrega os dados completos (ingredientes) de todas as receitas planejadas
      const fullRecipes = await Promise.all(
        plannerRecipes.map(r => window.loadRecipe(r.id))
      );

      fullRecipes.forEach(recipe => {
        const servingsMultiplier = currentPlanner[recipe.id] || 1;
        
        (recipe.ingredients || []).forEach(ing => {
          const name = ing.item.trim();
          const amountStr = ing.amount || '';
          
          // Normalização e conversão inteligente
          const standardized = parseAndStandardize(name, amountStr);
          
          const key = `${standardized.name}|${standardized.unit}`;
          const addedValue = standardized.value * servingsMultiplier;

          if (itemsMap.has(key)) {
            itemsMap.set(key, itemsMap.get(key) + addedValue);
          } else {
            itemsMap.set(key, addedValue);
          }
        });
      });

      // Convert map to sorted array
      const list = [];
      itemsMap.forEach((totalValue, key) => {
        const [name, unit] = key.split('|');
        list.push({ name, totalValue, unit });
      });

      list.sort((a, b) => {
        const aIsAgosto = a.unit === 'a gosto';
        const bIsAgosto = b.unit === 'a gosto';
        if (aIsAgosto && !bIsAgosto) return 1;
        if (!aIsAgosto && bIsAgosto) return -1;
        return a.name.localeCompare(b.name);
      });
      return list;
    }

    async function openShoppingList() {
      const btn = document.querySelector('.planner-actions .btn-primary');
      const originalText = btn.innerHTML;
      btn.innerHTML = '🛒 Carregando ingredientes...';
      
      try {
        const list = await compileShoppingList();
        const content = document.getElementById('shopping-list-content');
        
        if (list.length === 0) {
        content.innerHTML = '<p>Nenhum ingrediente encontrado.</p>';
      } else {
        content.innerHTML = list.map(item => `
          <div class="shopping-list-item">
            <span style="font-weight: 500;">${item.name}</span>
            <span style="color: var(--clr-text-muted);">${formatAmount(item.totalValue, item.unit)}</span>
          </div>
        `).join('');
      }

        const modal = document.getElementById('shopping-modal');
        modal.classList.add('active');
      } finally {
        btn.innerHTML = originalText;
      }
    }

    function closeShoppingList(e) {
      const modal = document.getElementById('shopping-modal');
      modal.classList.remove('active');
    }

    async function copyShoppingList() {
      const list = await compileShoppingList();
      let text = '🛒 Lista de Compras - Receitas da Isa\n\n';
      list.forEach(item => {
        text += `- ${item.name}: ${formatAmount(item.totalValue, item.unit)}\n`;
      });

      // Tenta a Clipboard API moderna primeiro; em HTTP (sem HTTPS) pode falhar
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showToast('📋 Lista copiada para a área de transferência!');
        }).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) {
          showToast('📋 Lista copiada para a área de transferência!');
        } else {
          showToast('❌ Não foi possível copiar. Tente selecionar manualmente.');
        }
      } catch (err) {
        showToast('❌ Erro ao copiar a lista.');
      }
    }

    function printShoppingList() {
      window.print();
    }

    document.addEventListener('DOMContentLoaded', () => {
      init();
      
      // Recarrega planejador quando o usuário logar/deslogar
      window.addEventListener('authChange', () => {
        if (allRecipes.length > 0) { // garante que index.json já carregou
          loadPlannerData();
        }
      });
    });

    window.handleClear = handleClear;
    window.openShoppingList = openShoppingList;
    window.closeShoppingList = closeShoppingList;
    window.copyShoppingList = copyShoppingList;
    window.printShoppingList = printShoppingList;
  </script>
</body>
</html>
